  <!-- Main letter -->

<text x="256" y="280"
font-family="'Noto Serif Georgian', 'DejaVu Sans', serif"
font-size="220"
text-anchor="middle"
dominant-baseline="middle"
fill="url(#letterGold)"
filter="url(#letterGlow)">მ</text>

