  </g>

  <!-- ── TOP DECORATIVE LINE ── -->

  <line x1="100" y1="118" x2="412" y2="118" stroke="rgba(125,207,125,0.2)" stroke-width="1"/>
  <!-- tiny diamond in center of line -->
  <polygon points="256,112 262,118 256,124 250,118" fill="rgba(125,207,125,0.35)"/>

  <!-- ── MAIN GEORGIAN LETTER მ (large, centered) ── -->

  <!-- Glow layer -->

<text x="256" y="280"
font-family="'Noto Serif Georgian', 'DejaVu Sans', serif"
font-size="220"
text-anchor="middle"
dominant-baseline="middle"
fill="rgba(45,122,58,0.4)"
