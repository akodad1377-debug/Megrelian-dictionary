    <script>
      (function() {
        var c = document.createElement('canvas');
        c.width = 512; c.height = 512;
        var ctx = c.getContext('2d');
        var S = 512;

        function rr(r) {
          ctx.beginPath();
          ctx.moveTo(r,0); ctx.lineTo(S-r,0);
          ctx.quadraticCurveTo(S,0,S,r);
          ctx.lineTo(S,S-r);
          ctx.quadraticCurveTo(S,S,S-r,S);
          ctx.lineTo(r,S);
          ctx.quadraticCurveTo(0,S,0,S-r);
          ctx.lineTo(0,r);
          ctx.quadraticCurveTo(0,0,r,0);
          ctx.closePath();
        }

        var bg = ctx.createLinearGradient(0,0,S,S);
        bg.addColorStop(0,'#f0faf0');
        bg.addColorStop(1,'#d8f0d8');
        rr(112); ctx.fillStyle=bg; ctx.fill();

        ctx.font="bold 340px 'Noto Serif Georgian',Georgia,serif";
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.shadowColor='rgba(0,100,0,0.2)';
        ctx.shadowBlur=20;
        var green = ctx.createLinearGradient(256,100,256,420);
        green.addColorStop(0,'#2d8a2d');
        green.addColorStop(1,'#1a5c1a');
        ctx.fillStyle=green;
        ctx.fillText('\u10db',256,270);

        var link = document.createElement('link');
        link.rel = 'apple-touch-icon';
        link.href = c.toDataURL('image/png');
        document.head.appendChild(link);
      })();
